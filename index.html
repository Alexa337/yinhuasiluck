<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    #clickImg {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      min-height: 300px;
      cursor: pointer;
      width: 100vw;
      height: auto;
      display: block;
    }
    body {
      margin: 0;
      background: #000;
    }
    /* 下面三张图保持原样 */
    img {
      display: block;
      width: 100vw;
      height: auto;
    }
  </style>
</head>
<body>
  <!-- 只有这一张可以点击切换 -->
  <img id="clickImg" src="Q1.png" alt="" />

  <!-- 这三张图片 100% 保留不动，不会被修改 -->
  <img src="2.png" alt="">
  <img src="3.png" alt="">
  <img src="4.png" alt="">

  <script>
    // 点击切换的图片数组
    const clickImages = [
      "Q1.png",
      "yinhuasi1.png"
    ];

    let i = 0;
    const img = document.getElementById("clickImg");

    // 点击切换（手机+电脑都能用）
    img.addEventListener("click", () => {
      i = (i + 1) % clickImages.length;
      img.src = clickImages[i] + "?v=" + Date.now();
    });
  </script>
</body>
</html>
